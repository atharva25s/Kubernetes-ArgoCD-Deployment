name: Build and Deploy Car App

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: atharva25s

jobs:

# ---------------------------------------------------
# JOB 1 — Setup + Docker Login + Tag Generation
# ---------------------------------------------------
  setup:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, 'Deploy image')"

    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: tag
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

# ---------------------------------------------------
# JOB 2 — Build Backend
# ---------------------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        run: |
          docker build \
            -f backend-car-app/Dockerfile \
            -t $DOCKERHUB_USERNAME/backend-car-app:${{ needs.setup.outputs.image_tag }} \
            backend-car-app

          docker push \
            $DOCKERHUB_USERNAME/backend-car-app:${{ needs.setup.outputs.image_tag }}

# ---------------------------------------------------
# JOB 3 — Build Frontend
# ---------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build \
            -f frontend-car-app/Dockerfile \
            -t $DOCKERHUB_USERNAME/frontend-car-app:${{ needs.setup.outputs.image_tag }} \
            frontend-car-app

          docker push \
            $DOCKERHUB_USERNAME/frontend-car-app:${{ needs.setup.outputs.image_tag }}

# ---------------------------------------------------
# JOB 4 — Deploy (Triggers ArgoCD via GitOps)
# ---------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Update Kubernetes Images
        run: |
          TAG=${{ needs.setup.outputs.image_tag }}

          sed -i "s|image: atharva25s/backend-car-app:.*|image: atharva25s/backend-car-app:${TAG}|" \
          K8s-specifications/deployment.yml

          sed -i "s|image: atharva25s/frontend-car-app:.*|image: atharva25s/frontend-car-app:${TAG}|" \
          K8s-specifications/deployment.yml

      - name: Commit & Push (Triggers ArgoCD)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add K8s-specifications/deployment.yml

          git commit -m "Deploy image with tag ${{ needs.setup.outputs.image_tag }}" && \

          git push
