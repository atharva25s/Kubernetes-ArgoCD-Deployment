apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: car-app-ingress

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-car-app-service
                port:
                  number: 8000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-car-app-service
                port:
                  number: 80
