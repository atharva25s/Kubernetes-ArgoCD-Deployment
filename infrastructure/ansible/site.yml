---
# =============================================================================
# Ansible Playbook: KinD + ArgoCD Full Setup
# Target  : EC2 Ubuntu 22.04 / 24.04
# Repo    : https://github.com/atharva25s/KinD-deployment-with-ArgoCD
# Run with: ansible-playbook -i inventory.ini site.yml
# =============================================================================

- name: KinD + ArgoCD Full Stack Setup
  hosts: ec2
  become: true
  vars:
    # ── Paths ──────────────────────────────────────────────────────────────────
    home_dir: /home/ubuntu
    workdir: "{{ home_dir }}/k8s-kind"
    repo_url: "https://github.com/atharva25s/KinD-deployment-with-ArgoCD.git"
    repo_dir: "{{ workdir }}/KinD-deployment-with-ArgoCD"

    # ── Cluster ────────────────────────────────────────────────────────────────
    kind_cluster_name: test-cluster
    kind_config: "{{ repo_dir }}/KinD-cluster/config.yml"

    # ── ArgoCD ─────────────────────────────────────────────────────────────────
    argocd_namespace: argocd
    argocd_app_name: car-app
    argocd_repo_url: "https://github.com/atharva25s/KinD-deployment-with-ArgoCD.git"
    argocd_app_path: K8s-specifications
    argocd_dest_namespace: default
    argocd_port_forward_port: 8443

  # ============================================================================
  # SECTION 1 – OS update & Docker
  # ============================================================================
  tasks:

    - name: "1.1 | Update apt cache"
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "1.2 | Install docker.io"
      apt:
        name: docker.io
        state: present

    - name: "1.3 | Add ubuntu to docker group"
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: "1.3a | Reset SSH connection so docker group membership takes effect"
      meta: reset_connection

    - name: "1.4 | Ensure docker service is started and enabled"
      service:
        name: docker
        state: started
        enabled: true

    # ============================================================================
    # SECTION 2 – Prep working directory & clone repo
    # ============================================================================

    - name: "2.1 | Create working directory {{ workdir }}"
      file:
        path: "{{ workdir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: "2.2 | Install git"
      apt:
        name: git
        state: present

    - name: "2.3 | Clone the application repo"
      become_user: ubuntu
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dir }}"
        version: main
        force: true

    # ============================================================================
    # SECTION 3 – Install KinD
    # ============================================================================

    - name: "3.1 | Make install_kind.sh executable"
      file:
        path: "{{ repo_dir }}/KinD-cluster/install_kind.sh"
        mode: "0755"

    - name: "3.2 | Run install_kind.sh"
      command: "{{ repo_dir }}/KinD-cluster/install_kind.sh"
      args:
        chdir: "{{ workdir }}"
        creates: /usr/local/bin/kind

    - name: "3.3 | Verify KinD installation"
      command: kind --version
      register: kind_version_out
      changed_when: false

    - name: "3.3 | Print KinD version"
      debug:
        msg: "{{ kind_version_out.stdout }}"

    # ============================================================================
    # SECTION 4 – Create KinD cluster
    # ============================================================================

    - name: "4.1 | Check if KinD cluster '{{ kind_cluster_name }}' already exists"
      command: kind get clusters
      register: existing_clusters
      changed_when: false
      failed_when: false

    - name: "4.2 | Create KinD cluster (1 control-plane + 2 workers)"
      command: >
        kind create cluster
        --config={{ kind_config }}
        --name={{ kind_cluster_name }}
      when: kind_cluster_name not in existing_clusters.stdout

    - name: "4.3 | Export kubeconfig to ubuntu home so kubectl works as ubuntu user"
      shell: |
        mkdir -p {{ home_dir }}/.kube
        kind get kubeconfig --name={{ kind_cluster_name }} > {{ home_dir }}/.kube/config
        chown -R ubuntu:ubuntu {{ home_dir }}/.kube
      args:
        executable: /bin/bash

    # ============================================================================
    # SECTION 5 – Install kubectl
    # ============================================================================

    - name: "5.1 | Make install_kubectl.sh executable"
      file:
        path: "{{ repo_dir }}/KinD-cluster/install_kubectl.sh"
        mode: "0755"

    - name: "5.2 | Run install_kubectl.sh"
      become_user: ubuntu
      command: "{{ repo_dir }}/KinD-cluster/install_kubectl.sh"
      args:
        chdir: "{{ workdir }}"
        creates: /usr/local/bin/kubectl

    - name: "5.3 | Verify kubectl – get nodes"
      become_user: ubuntu
      command: kubectl get nodes
      register: kubectl_nodes
      changed_when: false
      environment:
        HOME: "{{ home_dir }}"

    - name: "5.3 | Print cluster nodes"
      debug:
        msg: "{{ kubectl_nodes.stdout_lines }}"

    # ============================================================================
    # SECTION 6 – ArgoCD setup
    # ============================================================================

    - name: "6.1 | Create argocd namespace"
      become_user: ubuntu
      command: kubectl create namespace {{ argocd_namespace }}
      register: argocd_ns
      failed_when: >
        argocd_ns.rc != 0 and
        'already exists' not in argocd_ns.stderr
      changed_when: argocd_ns.rc == 0
      environment:
        HOME: "{{ home_dir }}"

    - name: "6.2 | Apply ArgoCD stable manifests (server-side to avoid CRD annotation size limit)"
      become_user: ubuntu
      command: >
        kubectl apply -n {{ argocd_namespace }}
        --server-side
        --force-conflicts
        -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      environment:
        HOME: "{{ home_dir }}"

    - name: "6.3 | Patch argocd-server service to NodePort"
      become_user: ubuntu
      command: >
        kubectl patch svc argocd-server -n {{ argocd_namespace }}
        -p '{"spec": {"type": "NodePort"}}'
      environment:
        HOME: "{{ home_dir }}"

    - name: "6.4 | Wait for argocd-server deployment to be ready"
      become_user: ubuntu
      command: >
        kubectl rollout status deployment/argocd-server
        -n {{ argocd_namespace }}
        --timeout=180s
      environment:
        HOME: "{{ home_dir }}"

    - name: "6.5 | Start port-forward for argocd-server on 0.0.0.0:8443 (background)"
      become_user: ubuntu
      shell: >
        nohup kubectl port-forward
        -n {{ argocd_namespace }}
        service/argocd-server
        {{ argocd_port_forward_port }}:443
        --address=0.0.0.0
        > {{ workdir }}/argocd-portforward.log 2>&1 &
      args:
        executable: /bin/bash
      environment:
        HOME: "{{ home_dir }}"

    - name: "6.6 | Pause 10s for port-forward to stabilise"
      pause:
        seconds: 10

    # ============================================================================
    # SECTION 7 – Nginx Ingress
    # ============================================================================

    - name: "7.1 | Install Nginx Ingress (KinD provider)"
      become_user: ubuntu
      command: >
        kubectl apply
        -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
      environment:
        HOME: "{{ home_dir }}"

    - name: "7.2 | Label control-plane node ingress-ready=true"
      become_user: ubuntu
      command: >
        kubectl label node {{ kind_cluster_name }}-control-plane
        ingress-ready=true
        --overwrite
      environment:
        HOME: "{{ home_dir }}"

    - name: "7.3 | Patch ingress-nginx-controller to use control-plane nodeSelector"
      become_user: ubuntu
      command: >
        kubectl patch deployment ingress-nginx-controller
        -n ingress-nginx
        --type=json
        -p='[{"op": "add", "path": "/spec/template/spec/nodeSelector",
              "value": {"kubernetes.io/hostname": "{{ kind_cluster_name }}-control-plane"}}]'
      environment:
        HOME: "{{ home_dir }}"

    - name: "7.4 | Wait for ingress-nginx controller to be ready"
      become_user: ubuntu
      command: >
        kubectl rollout status deployment/ingress-nginx-controller
        -n ingress-nginx
        --timeout=180s
      environment:
        HOME: "{{ home_dir }}"

    # ============================================================================
    # SECTION 8 – ArgoCD CLI install & login
    # ============================================================================

    - name: "8.1 | Install ArgoCD CLI binary"
      shell: |
        curl -sSL -o /tmp/argocd-linux-amd64 \
          https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        install -m 555 /tmp/argocd-linux-amd64 /usr/local/bin/argocd
        rm -f /tmp/argocd-linux-amd64
      args:
        creates: /usr/local/bin/argocd

    - name: "8.2 | Retrieve ArgoCD initial admin password"
      become_user: ubuntu
      shell: |
        kubectl get secret -n {{ argocd_namespace }} argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false
      environment:
        HOME: "{{ home_dir }}"

    - name: "8.3 | Print ArgoCD admin password (save this!)"
      debug:
        msg: "ArgoCD admin password: {{ argocd_password.stdout }}"

    - name: "8.4 | Log in to ArgoCD via CLI (insecure – self-signed cert)"
      become_user: ubuntu
      command: >
        argocd login localhost:{{ argocd_port_forward_port }}
        --username admin
        --password {{ argocd_password.stdout }}
        --insecure
      environment:
        HOME: "{{ home_dir }}"

    # ============================================================================
    # SECTION 9 – Create ArgoCD Application pointing at car-app K8s specs
    # ============================================================================

    - name: "9.1 | Create ArgoCD Application 'car-app'"
      become_user: ubuntu
      command: >
        argocd app create {{ argocd_app_name }}
        --repo {{ argocd_repo_url }}
        --path {{ argocd_app_path }}
        --dest-server https://kubernetes.default.svc
        --dest-namespace {{ argocd_dest_namespace }}
        --sync-policy automated
        --auto-prune
        --self-heal
        --insecure
      register: argocd_app_create
      failed_when: >
        argocd_app_create.rc != 0 and
        'already exists' not in argocd_app_create.stderr
      changed_when: argocd_app_create.rc == 0
      environment:
        HOME: "{{ home_dir }}"

    - name: "9.2 | Trigger initial sync for 'car-app'"
      become_user: ubuntu
      command: argocd app sync {{ argocd_app_name }} --insecure
      environment:
        HOME: "{{ home_dir }}"

    - name: "9.3 | Wait for car-app to become Healthy & Synced"
      become_user: ubuntu
      command: >
        argocd app wait {{ argocd_app_name }}
        --health
        --timeout 180
        --insecure
      environment:
        HOME: "{{ home_dir }}"

    # ============================================================================
    # SECTION 10 – Summary
    # ============================================================================

    - name: "10.1 | Print access information"
      debug:
        msg:
          - "============================================"
          - " Setup Complete!"
          - "============================================"
          - "ArgoCD UI  : https://<EC2_PUBLIC_IP>:8443"
          - "Username   : admin"
          - "Password   : {{ argocd_password.stdout }}"
          - "--------------------------------------------"
          - "car-app frontend : http://<EC2_PUBLIC_IP>"
          - "car-app backend  : http://<EC2_PUBLIC_IP>/api  (or via ingress path)"
          - "--------------------------------------------"
          - "Port-forward log : {{ workdir }}/argocd-portforward.log"
          - "============================================"
